name: gods_connect
description: A Flutter app for connecting with temples, prayers, and divine spirituality.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8

  # Sharing
  share_plus: ^10.0.0

  # Networking & Storage
  http: ^1.2.1
  shared_preferences: ^2.2.3

  # Location
  geolocator: ^12.0.0
  geocoding: ^3.0.0

  # Payments
  razorpay_flutter: ^1.3.7

  # Utilities
  url_launcher: ^6.2.5
  audioplayers: ^6.0.0
  google_maps_flutter: ^2.5.0
  flutter_polyline_points: ^2.0.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/temples.png